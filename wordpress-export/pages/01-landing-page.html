<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>127 | Yannick Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #1a1a2e;
            color: #e8eaed;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 32px;
            left: 32px;
            z-index: 30;
        }

        .logo img {
            height: 48px;
            width: auto;
            filter: brightness(1.1);
        }

        /* Language Toggle */
        .language-toggle {
            position: absolute;
            top: 32px;
            right: 32px;
            z-index: 30;
        }

        .language-toggle button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .language-toggle button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Glass Card */
        .glass-card {
            width: 100%;
            max-width: 672px;
            padding: 48px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Search Box */
        .search-container {
            position: relative;
            margin-bottom: 32px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
        }

        .search-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(48, 49, 52, 0.8);
            border: 1px solid rgba(138, 180, 248, 0.3);
            border-radius: 12px;
            color: #e8eaed;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #8ab4f8;
            background: rgba(48, 49, 52, 1);
        }

        /* Tool Cards */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }

        .tool-card {
            background: rgba(48, 49, 52, 0.6);
            border: 1px solid rgba(138, 180, 248, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .tool-card:hover {
            background: rgba(138, 180, 248, 0.15);
            border-color: #8ab4f8;
            transform: translateY(-2px);
        }

        .tool-icon {
            width: 32px;
            height: 32px;
            margin: 0 auto 12px;
            color: #8ab4f8;
        }

        .tool-name {
            font-size: 14px;
            font-weight: 500;
            margin: 0;
        }

        /* Add Tool Button */
        .add-tool-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 2px dashed rgba(138, 180, 248, 0.3);
            border-radius: 12px;
            color: #8ab4f8;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-tool-btn:hover {
            border-color: #8ab4f8;
            background: rgba(138, 180, 248, 0.1);
        }

        /* Build Version */
        .build-version {
            text-align: center;
            color: #9aa0a6;
            font-size: 12px;
            margin-top: 24px;
        }

        /* Feedback Button */
        .feedback-button {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 50;
            background: #8ab4f8;
            color: #202124;
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(138, 180, 248, 0.3);
            transition: all 0.3s;
        }

        .feedback-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(138, 180, 248, 0.4);
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video id="bgVideo" autoplay muted loop playsinline></video>
    </div>

    <!-- Logo -->
    <div class="logo">
        <img src="https://customer-assets.emergentagent.com/job_tool-metrics/artifacts/w5126i9x_127_2025_Official_Logo.png" alt="127 Logo">
    </div>

    <!-- Language Toggle -->
    <div class="language-toggle">
        <button id="langBtn" onclick="toggleLanguage()">English</button>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="glass-card">
            <!-- Search -->
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Zoek een tool..." onkeyup="filterTools()">
            </div>

            <!-- Tools Grid -->
            <div class="tools-grid" id="toolsGrid">
                <a href="/dpd" class="tool-card" data-keywords="pixel scherm test dead monitor display screen">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <p class="tool-name">Dead Pixel Detector</p>
                </a>

                <a href="/printer" class="tool-card" data-keywords="print printer test papier paper kleur color pattern">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    <p class="tool-name">Printer Tester</p>
                </a>

                <a href="/sscreen" class="tool-card" data-keywords="refresh rate fps hz scherm screen speed">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <p class="tool-name">Screen Refresh Tester</p>
                </a>

                <a href="/wea" class="tool-card" data-keywords="webcam camera audio microfoon microphone test">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"></polygon>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    <p class="tool-name">Webcam & Audio Test</p>
                </a>

                <a href="/password" class="tool-card" data-keywords="password wachtwoord generator veilig security secure">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <p class="tool-name">Password Generator</p>
                </a>
            </div>

            <!-- Add Tool Button -->
            <button class="add-tool-btn" onclick="openToolSuggestion()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Tool Voorstellen
            </button>

            <!-- Build Version -->
            <div class="build-version">Build 1.8.3</div>
        </div>
    </div>

    <!-- Feedback Button -->
    <button class="feedback-button" onclick="openFeedback()">💬 Feedback</button>

    <script>
        // Language State
        let currentLang = 'nl';
        const translations = {
            nl: {
                searchPlaceholder: 'Zoek een tool...',
                addTool: 'Tool Voorstellen',
                langBtn: 'English'
            },
            en: {
                searchPlaceholder: 'Search for a tool...',
                addTool: 'Suggest Tool',
                langBtn: 'Nederlands'
            }
        };

        // Toggle Language
        function toggleLanguage() {
            currentLang = currentLang === 'nl' ? 'en' : 'nl';
            document.getElementById('searchInput').placeholder = translations[currentLang].searchPlaceholder;
            document.querySelector('.add-tool-btn').childNodes[2].textContent = ' ' + translations[currentLang].addTool;
            document.getElementById('langBtn').textContent = translations[currentLang].langBtn;
        }

        // Filter Tools
        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.tool-card');
            
            cards.forEach(card => {
                const keywords = card.getAttribute('data-keywords');
                if (keywords.includes(query) || query === '') {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Open Tool Suggestion
        function openToolSuggestion() {
            alert('Tool suggestion feature - integrate with your WordPress form');
        }

        // Open Feedback
        function openFeedback() {
            alert('Feedback feature - integrate with your WordPress form');
        }

        // Load Pexels Videos
        async function loadVideoPlaylist() {
            try {
                const pages = [1, 2, 3];
                const allVideos = [];
                
                // NOTE: Replace with your WordPress AJAX endpoint
                const backendUrl = window.location.origin;
                
                for (const page of pages) {
                    const response = await fetch(
                        `${backendUrl}/wp-admin/admin-ajax.php?action=get_pexels_videos&query=technology+data+server+network+circuit+board+digital&orientation=landscape&per_page=10&page=${page}`
                    );
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.videos && data.videos.length > 0) {
                            allVideos.push(...data.videos);
                        }
                    }
                }

                if (allVideos.length > 0) {
                    const shuffled = allVideos.sort(() => Math.random() - 0.5);
                    const videoUrls = shuffled.slice(0, 10).map(video => {
                        const videoFile = video.video_files.find(file => file.quality === 'hd') || video.video_files[0];
                        return videoFile.link;
                    });
                    
                    playVideoPlaylist(videoUrls);
                }
            } catch (error) {
                console.error('Error loading videos:', error);
            }
        }

        let currentVideoIndex = 0;
        let playlist = [];

        function playVideoPlaylist(urls) {
            playlist = urls;
            const video = document.getElementById('bgVideo');
            
            video.src = playlist[currentVideoIndex];
            video.play();
            
            video.addEventListener('ended', () => {
                currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
                video.src = playlist[currentVideoIndex];
                video.play();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadVideoPlaylist();
        });
    </script>
</body>
</html>
